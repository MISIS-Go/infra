apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bezum
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: bezum-auth
                port:
                  number: 8002
          - path: /chat
            pathType: Prefix
            backend:
              service:
                name: bezum-chat
                port:
                  number: 8007
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: bezum-backend
                port:
                  number: 8001
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: bezum-backend
                port:
                  number: 8001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bezum-frontend
                port:
                  number: 8000
